<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>
      Relatório de Senhas
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">

  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Relatório de Senhas</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-card style="background: #fff; border-radius: 20px; box-shadow: 0 4px 16px #0001; border: none; padding-bottom: 4px;">
    <ion-card-header class="ion-text-center" style="background: #f5f8fa; border-radius: 20px 20px 0 0; border-bottom: 1.5px solid #e7ecef; padding: 28px 16px 20px;">
      <div>
        <ion-icon name="stats-chart-outline" size="large" color="medium"></ion-icon>
        <div style="background: #fafdff; border-radius: 14px; min-width: 120px; min-height: 54px; display: flex; align-items: center; justify-content: center; box-shadow: 0 1px 12px #e0e7ef90; border: 1px solid #eef1f3;">
          <span style="font-size: 2.2rem; color: #30597a; font-weight: 700;">Resumo</span>
        </div>
        <label style="margin-top: 14px; font-size: 1rem; color: #adb8c6; letter-spacing: 1px; text-transform: uppercase;">Total de Senhas Emitidas</label>
      </div>
    </ion-card-header>
    <ion-card-content style="display: flex; flex-direction: column; gap: 16px; padding: 32px 0 18px 0;">
      <ion-list>
        <ion-item>
          <ion-label>
            <ion-text color="primary"><strong>Total</strong></ion-text>
          </ion-label>
          <ion-badge 
            color="primary" 
            slot="end"
            style="font-size: 1.1rem; font-weight: 600; border-radius: 10px; padding: 6px 16px;"
          >
            {{ senhasService.senhasTotal }}
          </ion-badge>
        </ion-item>
        <ion-item>
          <ion-label>
            <ion-text color="medium"><strong>Geral</strong></ion-text>
          </ion-label>
          <ion-badge 
            color="secondary" 
            slot="end"
            style="font-size: 1rem; font-weight: 600; border-radius: 10px; padding: 5px 14px;"
          >
            {{ senhasService.senhasGeral }}
          </ion-badge>
        </ion-item>
        <ion-item>
          <ion-label>
            <ion-text color="success"><strong>Prioritária</strong></ion-text>
          </ion-label>
          <ion-badge 
            color="success" 
            slot="end"
            style="font-size: 1rem; font-weight: 600; border-radius: 10px; padding: 5px 14px;"
          >
            {{ senhasService.senhasPrior }}
          </ion-badge>
        </ion-item>
        <ion-item>
          <ion-label>
            <ion-text color="tertiary"><strong>Exame</strong></ion-text>
          </ion-label>
          <ion-badge 
            color="tertiary" 
            slot="end"
            style="font-size: 1rem; font-weight: 600; border-radius: 10px; padding: 5px 14px;"
          >
            {{ senhasService.senhasExame }}
          </ion-badge>
        </ion-item>
      </ion-list>
    </ion-card-content>
  </ion-card>
</ion-content>
