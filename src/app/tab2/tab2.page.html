<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Painel de Senhas</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">

  <ion-header collapse="condense">
    <ion-toolbar>
      <ion-title size="large">Painel de Senhas</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-card class="modern-card">
    <ion-card-header class="ion-text-center">
      <div>
        <ion-icon name="list-outline" size="large" color="medium"></ion-icon>
        <div class="senha-box">
          <span class="senha-gerada">Últimas Senhas</span>
        </div>
        <label class="senha-atual-label">Chamadas Recentes</label>
      </div>
    </ion-card-header>
    <ion-card-content>
      <ion-list>
        <ion-item *ngFor="let item of senhaService.ultimasChamadas; let i = index">
          <ion-label>
            <ion-text color="primary"><strong>#{{ i + 1 }}</strong></ion-text>
            {{ item.senha }}
            <span *ngIf="item.guiche">&nbsp;- Guichê {{ item.guiche }}</span>
          </ion-label>
        </ion-item>
        <ion-item *ngIf="senhaService.ultimasChamadas.length === 0">
          <ion-label>Nenhuma senha chamada.</ion-label>
        </ion-item>
      </ion-list>
    </ion-card-content>
  </ion-card>

  <ion-card class="modern-card">
    <ion-card-header class="ion-text-center">
      <div>
        <ion-icon name="person-circle-outline" size="large" color="medium"></ion-icon>
        <div class="senha-box">
          <span class="senha-gerada">Atendente</span>
        </div>
        <label class="senha-atual-label">Operação de Guichê</label>
      </div>
    </ion-card-header>
    <ion-card-content>
      <ion-item>
        <ion-label>Guichê</ion-label>
        <ion-select [(ngModel)]="guiche">
          <ion-select-option [value]="1">Guichê 1</ion-select-option>
          <ion-select-option [value]="2">Guichê 2</ion-select-option>
          <ion-select-option [value]="3">Guichê 3</ion-select-option>
        </ion-select>
      </ion-item>

      <ion-button 
        expand="block"
        size="large"
        class="geral"
        shape="round"
        fill="solid"
        (click)="chamar()"
      >
        <ion-icon name="megaphone-outline" slot="start" color="medium"></ion-icon>
        Chamar próxima senha
      </ion-button>

      <ion-card *ngIf="senhaAtual">
        <ion-card-header>
          <ion-card-title>Chamando</ion-card-title>
        </ion-card-header>
        <ion-card-content class="ion-text-center">
          <div class="senha-box">
            <span class="senha-gerada">{{ senhaAtual }}</span>
          </div>
          <label class="senha-atual-label">Dirija-se ao Guichê {{ guiche }}</label>
        </ion-card-content>
      </ion-card>
    </ion-card-content>
  </ion-card>

</ion-content>
